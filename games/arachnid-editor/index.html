<!DOCTYPE html>
<html>
<head>
  <title>Arachnid Text Editor</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #11111a;
      border-bottom: 2px solid #ff3333;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      color: #ff3333;
      text-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
    }
    .btn-group {
      display: flex;
      gap: 10px;
    }
    button {
      background: #161622;
      color: #ff3333;
      border: 1px solid #ff3333;
      padding: 6px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    button:hover {
      background: #ff3333;
      color: #0a0a0f;
      box-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
    }
    main {
      flex: 1;
      display: flex;
      padding: 15px;
      gap: 15px;
      box-sizing: border-box;
    }
    textarea {
      flex: 1;
      background: #07070b;
      border: 1px solid #222233;
      border-radius: 4px;
      padding: 15px;
      color: #dcdce6;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: #ff3333;
      box-shadow: 0 0 5px rgba(255, 51, 51, 0.2);
    }
    .preview {
      flex: 1;
      background: #0d0d16;
      border: 1px solid #222233;
      border-radius: 4px;
      padding: 15px;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .status-bar {
      background: #11111a;
      border-top: 1px solid #222233;
      padding: 5px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #777788;
    }
  </style>
</head>
<body>
  <header>
    <h1>Arachnid Editor</h1>
    <div class="btn-group">
      <button onclick="newFile()">NEW</button>
      <button onclick="saveFile()">SAVE</button>
      <button onclick="exportMD()">EXPORT HTML</button>
    </div>
  </header>
  <main>
    <textarea id="editor" placeholder="Write some Markdown here..." oninput="updatePreview()"></textarea>
    <div id="preview" class="preview"></div>
  </main>
  <div class="status-bar">
    <div id="wordCount">Words: 0 | Characters: 0</div>
    <div>v1.0.0 (WebSpider Studios)</div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const wordCount = document.getElementById('wordCount');

    editor.value = '# WebSpider Markdown Editor\\n\\nWelcome to the **Arachnid Editor**!\\nThis is a sleek utility tool built to test and view markdown files on the fly.\\n\\n## Features:\\n1. Live HTML Preview\\n2. Auto word count\\n3. Neon cyberpunk design\\n\\nStart typing on the left to see changes update dynamically on the right!';

    function updatePreview() {
      const text = editor.value;
      
      // Update word count
      const chars = text.length;
      const words = text.trim() === '' ? 0 : text.trim().split(/\\s+/).length;
      wordCount.innerText = 'Words: ' + words + ' | Characters: ' + chars;

      // Simple mock markdown compilation
      let html = text
        .replace(/\\n/g, '<br>')
        .replace(/\\*\\*(.*?)\\*\\*/g, '<strong>$1</strong>')
        .replace(/\\*(.*?)\\*/g, '<em>$1</em>')
        .replace(/^# (.*?)(?:<br>|$)/gm, '<h1>$1</h1>')
        .replace(/^## (.*?)(?:<br>|$)/gm, '<h2>$1</h2>')
        .replace(/^### (.*?)(?:<br>|$)/gm, '<h3>$1</h3>')
        .replace(/^- (.*?)(?:<br>|$)/gm, '<li>$1</li>');

      preview.innerHTML = html;
    }

    function newFile() {
      if (confirm('Create new file? Unsaved changes will be lost.')) {
        editor.value = '';
        updatePreview();
      }
    }

    function saveFile() {
      localStorage.setItem('arachnid_editor_autosave', editor.value);
      alert('File successfully saved to browser localstorage!');
    }

    function exportMD() {
      alert('HTML Export successful! Simulated file saved.');
    }

    // Load auto-save
    const saved = localStorage.getItem('arachnid_editor_autosave');
    if (saved) {
      editor.value = saved;
    }
    updatePreview();
  </script>
</body>
</html>
